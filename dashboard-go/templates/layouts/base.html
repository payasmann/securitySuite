{{define "base"}}<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0c10">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-app': '#0a0c10',
            'bg-panel': '#0d1117',
            'bg-sidebar': '#060810',
            'bg-card': '#13182a',
            'border': '#1e2433',
            'border-hover': '#2a3450',
            'accent': '#1a6cff',
            'accent-hover': '#2d7aff',
            'text-primary': '#e6edf3',
            'text-secondary': '#8b949e',
            'text-muted': '#484f58',
            'status-online': '#3fb950',
            'status-alert': '#f85149',
            'status-warning': '#d29922',
            'status-info': '#58a6ff',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-app text-text-primary antialiased min-h-screen">
  {{template "content" .}}
  <script src="/static/js/app.js"></script>
</body>
</html>{{end}}
