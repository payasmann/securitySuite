{{define "login.html"}}{{template "base" .}}{{end}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="w-14 h-14 rounded-xl bg-accent flex items-center justify-center">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-bg-panel border border-border rounded-xl p-6">
      <h1 class="text-xl font-semibold text-center mb-1">SafeGuard</h1>
      <p class="text-text-secondary text-sm text-center mb-6">Sign in to your account</p>

      <!-- Error -->
      <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-status-alert/10 border border-status-alert/20 text-status-alert text-sm"></div>

      <!-- Form -->
      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-xs text-text-secondary mb-1.5">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            class="w-full px-3 py-2.5 rounded-lg bg-bg-card border border-border text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent transition-colors"
            placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="block text-xs text-text-secondary mb-1.5">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full px-3 py-2.5 rounded-lg bg-bg-card border border-border text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent transition-colors"
            placeholder="Enter your password">
        </div>
        <button type="submit" id="login-btn"
          class="w-full py-2.5 rounded-lg bg-accent hover:bg-accent-hover text-white text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-text-muted text-xs mt-4">SafeGuard Security Dashboard</p>
  </div>
</div>
{{end}}
