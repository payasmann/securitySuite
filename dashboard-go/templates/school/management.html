{{define "school_management.html"}}{{template "school-layout" .}}{{end}}

{{define "page-content"}}
<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Camera Management</h1>
  </div>

  <!-- Camera Management Table -->
  <div class="bg-bg-panel border border-border rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-border text-text-secondary text-xs uppercase tracking-wider">
          <th class="text-left px-4 py-3 font-medium">Camera ID</th>
          <th class="text-left px-4 py-3 font-medium">Name</th>
          <th class="text-left px-4 py-3 font-medium">Zone</th>
          <th class="text-left px-4 py-3 font-medium">Type</th>
          <th class="text-left px-4 py-3 font-medium">Resolution</th>
          <th class="text-left px-4 py-3 font-medium">Status</th>
          <th class="text-left px-4 py-3 font-medium">Last Seen</th>
        </tr>
      </thead>
      <tbody id="management-table-body">
        <tr><td colspan="7" class="px-4 py-8 text-center text-text-muted">Loading cameras...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  App.loadManagement();
});
</script>
{{end}}
