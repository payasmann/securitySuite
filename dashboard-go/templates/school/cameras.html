{{define "school_cameras.html"}}{{template "school-layout" .}}{{end}}

{{define "page-content"}}
<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Cameras</h1>
    <div class="flex items-center gap-2">
      <button onclick="App.setCameraLayout('grid')" class="layout-btn active" id="btn-grid" title="Grid view">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
      </button>
      <button onclick="App.setCameraLayout('list')" class="layout-btn" id="btn-list" title="List view">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Camera Grid -->
  <div id="camera-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <!-- Populated by JS -->
    <div class="skeleton h-48 rounded-xl"></div>
    <div class="skeleton h-48 rounded-xl"></div>
    <div class="skeleton h-48 rounded-xl"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  App.loadCameras();
});
</script>
{{end}}
