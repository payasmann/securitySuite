{{define "ops_dashboard.html"}}{{template "ops-layout" .}}{{end}}

{{define "page-content"}}
<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Operations Dashboard</h1>
    <span class="text-xs text-text-muted">All schools overview</span>
  </div>

  <!-- Schools Overview Table -->
  <div class="bg-bg-panel border border-border rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-border text-text-secondary text-xs uppercase tracking-wider">
          <th class="text-left px-4 py-3 font-medium">School</th>
          <th class="text-left px-4 py-3 font-medium">Cameras</th>
          <th class="text-left px-4 py-3 font-medium">Alerts</th>
          <th class="text-left px-4 py-3 font-medium">Users</th>
          <th class="text-left px-4 py-3 font-medium">Bridge</th>
          <th class="text-left px-4 py-3 font-medium">Flags</th>
          <th class="text-left px-4 py-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="ops-schools-table">
        <tr><td colspan="7" class="px-4 py-8 text-center text-text-muted">Loading schools...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  App.loadOpsSchools();
});
</script>
{{end}}
